name: Lint and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ticketing-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Debug - repo layout (verify package.json location)
        run: |
          echo "PWD: $(pwd)"
          echo "Listing working dir:"
          ls -la
          echo "Listing repo root:"
          ls -la ..
        # keep || true so debug doesn't fail the job if something odd occurs
        shell: bash

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Debug - repo layout
        run: ls -la || true

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test -- --run

      - name: Run coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ticketing-frontend/coverage